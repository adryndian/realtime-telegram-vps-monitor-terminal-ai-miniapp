<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>Terminal</title><link rel="stylesheet" href="/static/vendor/xterm.css"><style>html,body{margin:0;height:100%;background:#050914;color:#dbe8ff;font-family:system-ui;overflow:hidden;touch-action:manipulation;-webkit-text-size-adjust:100%;-webkit-user-select:none;user-select:none}.bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;border-bottom:1px solid #1f2c45;background:#0d1424}.bar b{font-size:14px}.bar .act{display:inline-block;background:#17243a;color:#dbe8ff;border:1px solid #2a3b5b;border-radius:10px;padding:7px 10px;font-weight:750;font-size:14px;margin-left:5px}.warn{color:#ffbd45;font-size:12px}#term{height:calc(100vh - 98px);padding:5px 5px 64px;touch-action:none}.keys{position:fixed;left:0;right:0;bottom:var(--kb-bottom,0px);height:60px;display:flex;gap:6px;overflow-x:auto;align-items:center;padding:7px 8px calc(7px + env(safe-area-inset-bottom));background:#08101d;border-top:1px solid #1f2c45;z-index:30;touch-action:pan-x;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}.key{flex:0 0 auto;min-width:42px;text-align:center;background:#17243a;color:#dbe8ff;border:1px solid #2a3b5b;border-radius:10px;padding:8px 9px;font-weight:800;font-size:14px;line-height:1;touch-action:manipulation}.key.primary{background:#23406d}.key.nav{background:#26385c;color:#fff;min-width:44px}.key.danger{background:#3a1720;color:#ff8b99}.fallback{display:none;height:calc(100vh - 98px);padding:10px}#out{height:100%;width:100%;background:#050914;color:#dbe8ff;border:1px solid #1f2c45;border-radius:12px;padding:10px;font:12px monospace;white-space:pre-wrap;overflow:auto}.kb-catcher{position:fixed;left:0;right:0;bottom:calc(var(--kb-bottom,0px) + 60px);height:44px;opacity:.02;background:transparent;color:transparent;border:0;font-size:16px;z-index:10;caret-color:transparent;-webkit-user-select:text;user-select:text}.xterm textarea{font-size:16px!important;opacity:.01!important}</style></head><body><div class="bar"><b>VPS Terminal</b><span id="state" class="warn">connecting</span><div><span class="act" data-cmd="codex">Codex</span><span class="act" data-cmd="claude">Claude</span></div></div><div id="term"></div><div id="fallback" class="fallback"><div id="out"></div></div><textarea id="kb" class="kb-catcher" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea><div class="keys" id="keys"><div class="key" data-hide="1">Hide</div><div class="key nav" data-send="\u001b[A">↑</div><div class="key nav" data-send="\u001b[B">↓</div><div class="key nav" data-send="\u001b[D">←</div><div class="key nav" data-send="\u001b[C">→</div><div class="key" data-send="\r">Enter</div><div class="key" data-send="\u001b">Esc</div><div class="key" data-send="\t">Tab</div><div class="key" data-send="\x7f">⌫</div><div class="key danger" data-send="\u0003">⏹</div><div class="key" data-copy="1">Copy</div><div class="key" data-paste="1">Paste</div><div class="key primary" data-focus="1">Type</div></div><script src="https://telegram.org/js/telegram-web-app.js"></script><script src="/static/vendor/xterm.js"></script><script src="/static/vendor/xterm-addon-fit.js"></script><script>
const AUTO='{{auto|default("")}}';let init='';try{const u=new URLSearchParams(location.search);init=u.get('tg')||'';if(!init && window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();Telegram.WebApp.setHeaderColor('#050914');Telegram.WebApp.setBackgroundColor('#050914');init=Telegram.WebApp.initData||''}else if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();Telegram.WebApp.setHeaderColor('#050914');Telegram.WebApp.setBackgroundColor('#050914');}}catch(e){}
let qs='tg='+encodeURIComponent(init);if(!init){alert('Telegram auth required for terminal. Open from Mini App.');}
let proto=location.protocol==='https:'?'wss':'ws';let cmdArg=AUTO==='claude'?'&cmd=claude':AUTO==='codex'?'&cmd=codex':'';let ws=new WebSocket(`${proto}://${location.host}/ws/terminal?${qs}${cmdArg}`);let term,fit,fb=false;const kb=document.getElementById('kb');
function decodeKey(x){return String(x).replace(/\\u001b/g,'\x1b').replace(/\\u0003/g,'\x03').replace(/\\t/g,'\t').replace(/\\r/g,'\r').replace(/\\x7f/g,'\x7f')}function send(x){if(ws&&ws.readyState===1)ws.send(decodeKey(x))}
function focusKb(){try{kb.focus({preventScroll:true});setTimeout(()=>kb.focus({preventScroll:true}),30);setTimeout(()=>kb.focus({preventScroll:true}),120)}catch(e){try{kb.focus()}catch(_){}}}
function hideKb(){try{kb.blur();document.activeElement&&document.activeElement.blur();Telegram?.WebApp?.hideKeyboard?.()}catch(e){}}
function write(s){if(fb){let o=document.getElementById('out');o.textContent+=s;o.scrollTop=o.scrollHeight}else term&&term.write(s)}
function fallback(){fb=true;document.getElementById('term').style.display='none';document.getElementById('fallback').style.display='block';document.getElementById('state').textContent='fallback';focusKb()}
try{term=new Terminal({cursorBlink:true,fontSize:10,scrollback:5000,convertEol:true,disableStdin:false,fontFamily:'ui-monospace,SFMono-Regular,Menlo,monospace',theme:{background:'#050914',foreground:'#dbe8ff',cursor:'#57a7ff'}});fit=new FitAddon.FitAddon();term.loadAddon(fit);term.open(document.getElementById('term'));setTimeout(()=>{fit.fit();resize();focusKb()},250);term.onData(d=>send(d))}catch(e){fallback()}
kb.addEventListener('input',()=>{let v=kb.value;if(v){send(v);kb.value=''}},{passive:true});
kb.addEventListener('keydown',e=>{if(e.key==='Enter'){send('\r');e.preventDefault()}else if(e.key==='Backspace'){send('\x7f');e.preventDefault()}else if(e.key==='Tab'){send('\t');e.preventDefault()}else if(e.key==='Escape'){send('\u001b');e.preventDefault()}},{passive:false});
function terminalText(){try{let b=term.buffer.active, out=[]; for(let i=0;i<Math.min(b.length,80);i++){out.push(b.getLine(i)?.translateToString(true)||'')} return out.join('\n').trim()}catch(e){return ''}}
async function navTap(el){
 if(el.dataset.hide){hideKb();return}
 if(el.dataset.focus){focusKb();return}
 if(el.dataset.copy){let txt='';try{txt=term?.getSelection?.()||terminalText(); await navigator.clipboard.writeText(txt); document.getElementById('state').textContent='copied'}catch(e){let txt=term?.getSelection?.()||terminalText(); window.prompt('Copy manual:',txt); document.getElementById('state').textContent='copy manual'}focusKb();return}
 if(el.dataset.paste){try{let txt=await navigator.clipboard.readText(); if(!txt) txt=window.prompt('Paste text:','')||''; if(txt) send(txt); document.getElementById('state').textContent='pasted'}catch(e){let txt=window.prompt('Paste text:','')||''; if(txt) send(txt); document.getElementById('state').textContent=txt?'pasted':'paste cancel'}focusKb();return}
 if(el.dataset.send){send(el.dataset.send);focusKb();return}
 if(el.dataset.cmd){send(el.dataset.cmd+'\r');focusKb();return}
}
document.querySelectorAll('.key,.act').forEach(el=>{let moved=false;el.addEventListener('touchstart',e=>{moved=false},{passive:true});el.addEventListener('touchmove',e=>{moved=true},{passive:true});el.addEventListener('touchend',e=>{if(moved)return;e.preventDefault();e.stopPropagation();navTap(el)},{passive:false});el.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();navTap(el)});});
document.getElementById('term').addEventListener('pointerdown',e=>{e.preventDefault();focusKb()},{passive:false});
ws.onopen=()=>{document.getElementById('state').textContent='connected';resize();focusKb()};ws.onmessage=e=>write(e.data);ws.onerror=()=>{document.getElementById('state').textContent='ws error'};ws.onclose=()=>{document.getElementById('state').textContent='closed';write('\r\n[disconnected]\r\n')};
function resize(){try{fit&&fit.fit();ws.readyState===1&&term&&ws.send(`__resize__:${term.cols}:${term.rows}`)}catch(e){}}addEventListener('resize',()=>setTimeout(()=>{resize();focusKb()},120));

function adjustKeyboardBar(){try{let vv=window.visualViewport;if(!vv)return;let bottom=Math.max(0, window.innerHeight - vv.height - vv.offsetTop);document.documentElement.style.setProperty('--kb-bottom', bottom+'px');setTimeout(resize,50)}catch(e){}}
if(window.visualViewport){visualViewport.addEventListener('resize',adjustKeyboardBar);visualViewport.addEventListener('scroll',adjustKeyboardBar);adjustKeyboardBar();}
document.addEventListener('gesturestart',e=>e.preventDefault());
</script></body></html>
