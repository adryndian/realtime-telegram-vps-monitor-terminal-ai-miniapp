<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>VPS Monitor</title><link rel="stylesheet" href="/static/style.css"></head><body>
<div class="app">
 <div class="topbar"><div class="brand"><div class="logo">E</div><div><h1>VPS Monitor</h1><p><span id="host">Connecting…</span> <button id="maskBtn" class="maskBtn" onclick="toggleMask()">Hide</button></p></div></div><div id="health" class="status">CHECK</div></div>
 <section class="hero"><div class="heroHead"><div><div class="metricLabel">CPU usage</div><div id="cpu" class="cpuBig">--%</div><div id="load" class="sub">load --</div></div><div class="ringWrap"><svg viewBox="0 0 120 120"><circle class="ringBg" cx="60" cy="60" r="50"/><circle id="cpuRing" class="ringVal" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="314"/></svg></div></div><div class="miniStats"><div class="chip"><b id="cores">-</b><span class="sub">Cores</span></div><div class="chip"><b id="uptime">-</b><span class="sub">Uptime</span></div><div class="chip"><b id="refresh">-</b><span class="sub">Refresh</span></div></div><div id="alerts" class="alerts"></div></section>
 <section class="grid"><div class="card"><h3>Memory</h3><div id="ram" class="value">--%</div><div id="ramBarBox" class="bar"><i id="ramBar"></i></div><p id="ramd" class="sub">-</p></div><div class="card"><h3>Storage</h3><div id="disk" class="value">--%</div><div id="diskBarBox" class="bar"><i id="diskBar"></i></div><p id="diskd" class="sub">-</p></div></section>
 <section class="panel"><div class="panelTop"><h3>Services</h3><small>live</small></div><div id="svc"></div></section>
 <section class="panel"><div class="panelTop"><h3>Processes</h3><small>top CPU</small></div><div id="top"></div></section>
 <a class="termBtn" href="/terminal">Open Terminal</a><div class="footer">Internal only • <span id="ts">-</span></div>
</div><script src="https://telegram.org/js/telegram-web-app.js"></script><script>const REFRESH={{refresh}};</script><script src="/static/app.js"></script></body></html>
